<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Game Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>EchoSystem Gaming</h1>
    </header>

    <main class="game-grid">
        <div class="game-card">
            <div class="image-placeholder">Thumbnail</div>
            <div class="card-content">
                <h2>Taxi Night Shift</h2>
                <p>Escape or get caught</p>
                <a href="taxi-night-shift/" class="play-btn">Play Now</a> 
            </div>
        </div>

        <div class="game-card">
            <div class="image-placeholder">Thumbnail</div>
            <div class="card-content">
                <h2>Pixel Platformer</h2>
                <p>Jump and run through 10 levels.</p>
                <a href="/pixel-platformer/" class="play-btn">Play Now</a>
            </div>
        </div>
    </main>

</body>
</html>
